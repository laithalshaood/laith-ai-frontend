<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم | لخّصلي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--p:#6366f1;--pd:#4f46e5;--s:#ec4899;--a:#8b5cf6;--bg:#0f0f1a;--c:#1a1a2e;--cl:#252542;--t:#e2e8f0;--tm:#94a3b8;--b:rgba(255,255,255,0.08);--ok:#22c55e;--w:#f59e0b;--er:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.admin-box{background:var(--c);border-radius:20px;border:1px solid var(--b);padding:2.5rem;max-width:450px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.admin-header{text-align:center;margin-bottom:2rem}
.admin-header i{font-size:3rem;color:var(--p);margin-bottom:1rem}
.admin-header h1{font-size:1.8rem;font-weight:900;margin-bottom:0.3rem}
.admin-header p{color:var(--tm);font-size:0.95rem}
.form-group{margin-bottom:1.2rem}
.form-group label{display:block;margin-bottom:0.5rem;font-weight:700;font-size:0.95rem}
.form-group input{width:100%;padding:1rem;border-radius:12px;border:2px solid var(--b);background:var(--cl);color:var(--t);font-family:'Tajawal',sans-serif;font-size:1rem;transition:border-color 0.3s}
.form-group input:focus{outline:none;border-color:var(--p)}
.form-group input::placeholder{color:var(--tm)}
.btn{width:100%;padding:1rem;font-size:1rem;border-radius:12px;border:none;font-family:'Tajawal',sans-serif;font-weight:700;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:0.5rem}
.btn-p{background:linear-gradient(135deg,var(--p),var(--a));color:#fff;box-shadow:0 4px 20px rgba(99,102,241,0.3)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(99,102,241,0.4)}
.btn-p:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.result{margin-top:1.5rem;padding:1.2rem;border-radius:12px;display:none;text-align:center;font-weight:700}
.result.show{display:block}
.result.success{background:rgba(34,197,94,0.15);border:1px solid var(--ok);color:var(--ok)}
.result.error{background:rgba(239,68,68,0.15);border:1px solid var(--er);color:var(--er)}
.result i{margin-left:0.5rem}
.back-link{text-align:center;margin-top:1.5rem}
.back-link a{color:var(--tm);text-decoration:none;font-size:0.9rem;transition:color 0.3s}
.back-link a:hover{color:var(--p)}
.info-box{background:var(--cl);border-radius:12px;padding:1rem;margin-bottom:1.5rem;border:1px solid var(--b)}
.info-box h4{color:var(--p);margin-bottom:0.5rem;font-size:0.95rem}
.info-box p{color:var(--tm);font-size:0.85rem;line-height:1.6}
.login-box{display:none}
.login-box.show{display:block}
.main-box{display:none}
.main-box.show{display:block}
</style>
</head>
<body>

<!-- LOGIN BOX -->
<div class="admin-box login-box show" id="loginBox">
<div class="admin-header">
<i class="fas fa-lock"></i>
<h1>تسجيل دخول المشرف</h1>
<p>أدخل بيانات حساب المشرف</p>
</div>
<div class="form-group">
<label><i class="fas fa-envelope" style="color:var(--p)"></i> الإيميل</label>
<input type="email" id="adminEmail" placeholder="admin@example.com">
</div>
<div class="form-group">
<label><i class="fas fa-key" style="color:var(--p)"></i> كلمة المرور</label>
<input type="password" id="adminPassword" placeholder="••••••••">
</div>
<button class="btn btn-p" id="loginBtn" onclick="doAdminLogin()">
<i class="fas fa-sign-in-alt"></i> دخول
</button>
<div class="result" id="loginResult"></div>
<div class="back-link">
<a href="index.html"><i class="fas fa-arrow-right"></i> رجوع للموقع الرئيسي</a>
</div>
</div>

<!-- MAIN ADMIN BOX -->
<div class="admin-box main-box" id="mainBox">
<div class="admin-header">
<i class="fas fa-cog"></i>
<h1>لوحة تحكم المشرف</h1>
<p>تفعيل اشتراكات المستخدمين يدوياً</p>
</div>

<div class="info-box">
<h4><i class="fas fa-info-circle"></i> كيفية الاستخدام</h4>
<p>1. المستخدم بيدفع عبر الشام كاش<br>2. ببعتلك screenshot على واتساب<br>3. أنت بتفتح هاي الصفحة وبتدخل معرف الدفعة<br>4. بتضغط "فعل الاشتراك" وبيشتغل!</p>
</div>

<div class="form-group">
<label><i class="fas fa-key" style="color:var(--p)"></i> معرف الدفعة (Payment ID)</label>
<input type="text" id="paymentId" placeholder="مثلاً: abc-123-xyz">
</div>

<button class="btn btn-p" id="activateBtn" onclick="activateSubscription()">
<i class="fas fa-check-circle"></i> فعل الاشتراك
</button>

<div class="result" id="result"></div>

<div style="margin-top:1.5rem;text-align:center">
<button class="btn btn-p" style="background:var(--cl);border:1px solid var(--b);color:var(--tm)" onclick="logout()">
<i class="fas fa-sign-out-alt"></i> خروج
</button>
</div>

<div class="back-link">
<a href="index.html"><i class="fas fa-arrow-right"></i> رجوع للموقع الرئيسي</a>
</div>
</div>

<script>
const API_URL = 'https://laith-ai-backend-drgd.onrender.com/api';
let adminToken = localStorage.getItem('laith_admin_token');

// Check if already logged in
if (adminToken) {
    document.getElementById('loginBox').classList.remove('show');
    document.getElementById('mainBox').classList.add('show');
}

async function doAdminLogin() {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    const btn = document.getElementById('loginBtn');
    const result = document.getElementById('loginResult');

    if (!email || !password) {
        result.className = 'result error show';
        result.innerHTML = '<i class="fas fa-exclamation-circle"></i> اكتب الإيميل وكلمة المرور';
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';

    try {
        const res = await fetch(API_URL + '/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const contentType = res.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
            throw new Error('السيرفر رجّع خطأ (مو JSON). تأكد إنه شغال.');
        }

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.error || 'خطأ بالدخول');
        }

        // Check if admin
        const meRes = await fetch(API_URL + '/auth/me', {
            headers: { 'Authorization': 'Bearer ' + data.token }
        });
        const meData = await meRes.json();

        if (meData.user?.plan !== 'admin') {
            throw new Error('هاد الحساب مش مشرف!');
        }

        adminToken = data.token;
        localStorage.setItem('laith_admin_token', adminToken);

        document.getElementById('loginBox').classList.remove('show');
        document.getElementById('mainBox').classList.add('show');
        result.className = 'result';

    } catch (err) {
        result.className = 'result error show';
        result.innerHTML = '<i class="fas fa-times-circle"></i> ' + err.message;
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> دخول';
    }
}

async function activateSubscription() {
    const paymentId = document.getElementById('paymentId').value.trim();
    const btn = document.getElementById('activateBtn');
    const result = document.getElementById('result');

    if (!paymentId) {
        result.className = 'result error show';
        result.innerHTML = '<i class="fas fa-exclamation-circle"></i> اكتب معرف الدفعة أولاً';
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التفعيل...';
    result.className = 'result';

    try {
        const res = await fetch(API_URL + '/payment/confirm/' + paymentId, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + adminToken
            }
        });

        const contentType = res.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
            const text = await res.text();
            console.error('Server returned HTML:', text.substring(0, 200));
            throw new Error('السيرفر رجّع خطأ (HTML مش JSON). السيرفر نايم أو معطل.');
        }

        const data = await res.json();

        if (data.success) {
            result.className = 'result success show';
            result.innerHTML = '<i class="fas fa-check-circle"></i> ' + data.message + 
                '<br><small style="color:var(--tm)">الخطة: ' + data.plan + ' | المستخدم: ' + data.userId + '</small>';
            document.getElementById('paymentId').value = '';
        } else {
            result.className = 'result error show';
            result.innerHTML = '<i class="fas fa-times-circle"></i> ' + (data.error || 'صار خطأ');
        }
    } catch (err) {
        result.className = 'result error show';
        result.innerHTML = '<i class="fas fa-times-circle"></i> ' + err.message;
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check-circle"></i> فعل الاشتراك';
    }
}

function logout() {
    adminToken = null;
    localStorage.removeItem('laith_admin_token');
    document.getElementById('mainBox').classList.remove('show');
    document.getElementById('loginBox').classList.add('show');
}

// Enter key support
document.getElementById('paymentId').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') activateSubscription();
});
document.getElementById('adminPassword').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') doAdminLogin();
});
</script>
</body>
</html>
